
<!DOCTYPE html>
<html>
<head>
    <title>AI Intelligence Engine</title>
    <style>
        body {
            font-family: serif;
            padding: 40px;
            background: #f5f5f5;
        }
        textarea {
            width: 100%;
            height: 80px;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            margin-top: 10px;
            cursor: pointer;
        }
        #result {
            margin-top: 20px;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<h1>🏛️ Geopolitical Intelligence Engine</h1>

<textarea id="topic" placeholder="Enter topic..."></textarea>
<br>
<button onclick="analyze()">Analyze</button>

<div id="result"></div>

<script>
async function analyze() {
    const topic = document.getElementById("topic").value;

    const res = await fetch("/api/analyze", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ topic })
    });

    const data = await res.json();

    document.getElementById("result").innerText =
        data.result || data.error;
}
</script>

</body>
</html>
